[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; script-src-elem 'self' 'unsafe-inline' 'unsafe-eval' https:; connect-src 'self' https: wss:; frame-src 'self' https:; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https:; worker-src 'self' blob: https:;"
    Referrer-Policy = "no-referrer-when-downgrade"

[[plugins]]
  package = "@netlify/plugin-nextjs"
