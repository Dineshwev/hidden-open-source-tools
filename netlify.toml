[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://al5sm.com https://5gvci.com https://nap5k.com https://n6wxm.com; script-src-elem 'self' 'unsafe-inline' 'unsafe-eval' https://al5sm.com https://5gvci.com https://nap5k.com https://n6wxm.com; connect-src 'self' https://al5sm.com https://5gvci.com https://nap5k.com https://n6wxm.com; frame-src 'self' https://al5sm.com https://5gvci.com https://nap5k.com https://n6wxm.com https://omg10.com; img-src 'self' data: https://al5sm.com https://5gvci.com https://nap5k.com https://n6wxm.com https://omg10.com; style-src 'self' 'unsafe-inline';"
    Referrer-Policy = "no-referrer-when-downgrade"

[[plugins]]
  package = "@netlify/plugin-nextjs"
